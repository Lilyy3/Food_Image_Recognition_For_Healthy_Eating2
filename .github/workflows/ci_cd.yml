name: Food Recognition CI/CD

on: [push, pull_request]

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies directly (no requirements.txt needed)
        run: |
          pip install --upgrade pip
          pip install tensorflow streamlit pandas numpy pillow scikit-learn
      
      - name: Run unit tests (skip because no tests folder yet)
        run: |
          echo " No tests folder found, skipping unit tests for now."
      
      - name: Evaluate model on sample data
        run: |
          python model_evaluation.py --test-sample
